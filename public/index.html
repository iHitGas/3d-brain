<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Brain Atlas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060e;color:#e5e7eb;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{display:block;position:fixed;inset:0}

.hdr{position:fixed;top:0;left:0;right:0;padding:20px 32px;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(6,6,14,.9) 0%,transparent)}
.hdr-l{display:flex;align-items:center;gap:16px}
.logo{width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#a78bfa,#6d28d9);box-shadow:0 0 20px rgba(139,92,246,.3);display:flex;align-items:center;justify-content:center;font-size:16px}
.title{font-size:14px;font-weight:600;letter-spacing:.02em;color:#c4b5fd}
.title span{color:#4c1d95;font-weight:400}

.hdr-stats{display:flex;gap:24px}
.stat{text-align:center}
.stat-v{font-size:18px;font-weight:700;color:#e0e0ff}
.stat-l{font-size:9px;color:#2e2b4a;text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

.filters{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;padding:6px 10px;border-radius:12px;background:rgba(6,6,14,.8);border:1px solid rgba(139,92,246,.06);backdrop-filter:blur(16px)}
.filter-btn{font-size:10px;padding:6px 12px;border-radius:8px;border:none;background:transparent;color:#3b3654;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;font-weight:500;white-space:nowrap}
.filter-btn:hover{color:#8b7fb8}
.filter-btn.active{color:#c4b5fd;background:rgba(139,92,246,.1)}
.filter-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;box-shadow:0 0 6px currentColor}

.panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:rgba(8,6,20,.95);border-left:1px solid rgba(139,92,246,.05);z-index:15;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(30px);padding:44px 28px 28px;overflow-y:auto}
.panel.open{transform:translateX(0)}
.panel-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.03);color:#4c3f6d;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.panel-close:hover{color:#a78bfa;background:rgba(139,92,246,.06)}
.panel-title{font-size:22px;font-weight:700;color:#e8e0ff;letter-spacing:-.01em}
.panel-kind{display:inline-block;font-size:10px;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;margin-top:8px;padding:3px 10px;border-radius:6px;background:rgba(124,58,237,.06)}
.panel-desc{margin-top:10px;font-size:13px;color:#4b4272;line-height:1.5}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.panel-metric{padding:12px;border-radius:10px;background:rgba(255,255,255,.015)}
.panel-metric-label{font-size:9px;color:#2e2b4a;text-transform:uppercase;letter-spacing:.08em}
.panel-metric-value{font-size:20px;font-weight:700;color:#c4b5fd;margin-top:4px}
.panel-section{margin-top:16px}
.panel-label{font-size:9px;color:#2e2b4a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.panel-connections{display:flex;flex-wrap:wrap;gap:4px}
.conn-tag{font-size:10px;padding:4px 10px;border-radius:6px;background:rgba(139,92,246,.04);color:#8b7fb8;cursor:pointer;transition:all .15s;border:1px solid rgba(139,92,246,.04)}
.conn-tag:hover{background:rgba(139,92,246,.1);color:#c4b5fd;border-color:rgba(139,92,246,.1)}
.recall-bar{height:3px;border-radius:2px;background:rgba(139,92,246,.08);margin-top:6px;overflow:hidden}
.recall-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.dream-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:6px 12px;border-radius:8px;background:rgba(192,132,252,.06);color:#c084fc;margin-top:12px}

.tooltip{position:fixed;z-index:20;pointer-events:none;padding:6px 12px;border-radius:6px;background:rgba(8,6,20,.9);border:1px solid rgba(139,92,246,.08);backdrop-filter:blur(8px);opacity:0;transition:opacity .12s;white-space:nowrap}
.tooltip.visible{opacity:1}
.tooltip-name{font-size:12px;font-weight:600;color:#e0d4ff}
.tooltip-region{font-size:9px;color:#4b3f6d;margin-top:1px}

.loader{position:fixed;inset:0;z-index:100;background:#06060e;display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
.loader.done{opacity:0;visibility:hidden;pointer-events:none}
.loader-ring{width:48px;height:48px;border-radius:50%;border:2px solid rgba(139,92,246,.08);border-top-color:#7c3aed;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-ring"></div></div>
<div class="tooltip" id="tooltip"><div class="tooltip-name" id="tooltipName"></div><div class="tooltip-region" id="tooltipRegion"></div></div>

<div class="hdr">
  <div class="hdr-l"><div class="logo">🧠</div><div class="title">Brain Atlas <span>/ 3D</span></div></div>
  <div class="hdr-stats" id="hdrStats"></div>
</div>

<div class="filters" id="filters"></div>
<div class="panel" id="panel"><button class="panel-close" onclick="closePanel()">×</button><div id="panelContent"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const R = {
  prefrontal:  { c:0x818cf8, pos:[0,.3,1.2],   hex:'#818cf8', name:'Prefrontal',  about:'Identity & decisions' },
  thalamus:    { c:0x60a5fa, pos:[0,0,0],       hex:'#60a5fa', name:'Thalamus',    about:'Routing & relay' },
  hippocampus: { c:0x34d399, pos:[-.8,-.2,-.5],  hex:'#34d399', name:'Hippocampus', about:'Memory & indexing' },
  motor:       { c:0xf472b6, pos:[0,.8,.3],      hex:'#f472b6', name:'Motor Cortex',about:'Action & projects' },
  occipital:   { c:0xfbbf24, pos:[0,-.1,-1.3],   hex:'#fbbf24', name:'Occipital',   about:'Visual & reference' },
  temporal:    { c:0xfb923c, pos:[-1.2,0,.3],    hex:'#fb923c', name:'Temporal',    about:'Social & people' },
  cerebellum:  { c:0x2dd4bf, pos:[.8,-.5,-.8],   hex:'#2dd4bf', name:'Cerebellum',  about:'Daily routines' },
  limbic:      { c:0xc084fc, pos:[0,.4,-.3],     hex:'#c084fc', name:'Limbic',      about:'Dreams & emotion' }
};

let D=null, N=[], E=[], scene,cam,ren,ctrl,ray,mouse,bg,pts;
let nMeshes=[],gMeshes=[],hovered=null,selected=null,filter=null,t=0;

async function load(){try{D=await(await fetch('/api/data')).json()}catch{D={nodes:[],edges:[]}}init()}

function init(){
  scene=new THREE.Scene();
  cam=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,.1,500);
  cam.position.set(0,2,10);

  ren=new THREE.WebGLRenderer({antialias:true,alpha:true});
  ren.setSize(innerWidth,innerHeight);
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.toneMapping=THREE.ACESFilmicToneMapping;
  ren.toneMappingExposure=1.3;
  document.body.appendChild(ren.domElement);

  ctrl=new THREE.OrbitControls(cam,ren.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=.05;
  ctrl.maxDistance=20;ctrl.minDistance=4;
  ctrl.autoRotate=true;ctrl.autoRotateSpeed=.2;

  ray=new THREE.Raycaster();mouse=new THREE.Vector2(-9,-9);

  // Lighting — soft, cinematic
  scene.add(new THREE.AmbientLight(0x1e1b4b,.35));
  const sun=new THREE.DirectionalLight(0xc4b5fd,.5);sun.position.set(5,8,4);scene.add(sun);
  const fill=new THREE.DirectionalLight(0x818cf8,.2);fill.position.set(-4,-2,-3);scene.add(fill);

  bg=new THREE.Group();scene.add(bg);

  // Subtle brain outline — single smooth wireframe sphere
  const shell=new THREE.Mesh(
    new THREE.SphereGeometry(3.5,48,48),
    new THREE.MeshBasicMaterial({color:0x2e1065,wireframe:true,transparent:true,opacity:.02})
  );
  bg.add(shell);

  // Soft inner glow
  const core=new THREE.Mesh(
    new THREE.SphereGeometry(.8,16,16),
    new THREE.MeshBasicMaterial({color:0x4c1d95,transparent:true,opacity:.04})
  );
  bg.add(core);

  // Build
  makeNodes();makeEdges();makeDust();makeStars();makeUI();

  addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});
  addEventListener('mousemove',onMove);
  addEventListener('click',onClick);

  setTimeout(()=>document.getElementById('loader').classList.add('done'),400);
  loop();
}

function makeNodes(){
  const rn={};
  D.nodes.forEach((n,i)=>{const r=n.region||'thalamus';if(!rn[r])rn[r]=[];rn[r].push(i)});

  D.nodes.forEach((node,i)=>{
    const reg=R[node.region]||R.thalamus;
    const c=reg.c;
    const list=rn[node.region]||[];
    const idx=list.indexOf(i);
    const cnt=list.length;
    const [rx,ry,rz]=reg.pos;
    const cx=rx*2,cy=ry*2.5,cz=rz*2;
    const sr=Math.max(.6,Math.sqrt(cnt)*.4);
    let nx,ny,nz;
    if(cnt<=1){nx=cx;ny=cy;nz=cz}
    else if(cnt<=3){const a=(idx/cnt)*Math.PI*2;nx=cx+Math.cos(a)*sr*.5;ny=cy;nz=cz+Math.sin(a)*sr*.5}
    else{const g=Math.PI*(3-Math.sqrt(5)),th=g*idx,ph=Math.acos(1-2*(idx+.5)/cnt);nx=cx+sr*Math.sin(ph)*Math.cos(th);ny=cy+sr*Math.cos(ph);nz=cz+sr*Math.sin(ph)*Math.sin(th)}

    const s=hashCode(node.id);
    nx+=(pr(s+10)-.5)*.1;ny+=(pr(s+11)-.5)*.1;nz+=(pr(s+12)-.5)*.1;
    const mxR=3.1;const len=Math.sqrt(nx*nx+ny*ny+nz*nz);
    if(len>mxR){const sc=mxR/len;nx*=sc;ny*=sc;nz*=sc}

    // Node size — meta bigger, project smaller
    const sz=node.kind==='meta'?.22:node.kind==='dream'?.2:.15;

    // Main sphere — smooth, high-poly, emissive glow
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(sz,24,24),
      new THREE.MeshStandardMaterial({
        color:c,emissive:c,emissiveIntensity:.4,
        roughness:.3,metalness:.6,
        transparent:true,opacity:.9
      })
    );
    mesh.position.set(nx,ny,nz);
    mesh.userData={node,i,sz,tE:.4,tO:.9};
    bg.add(mesh);nMeshes.push(mesh);

    // Glow — larger transparent sphere around each node
    const glow=new THREE.Mesh(
      new THREE.SphereGeometry(sz*3,12,12),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.04})
    );
    glow.position.copy(mesh.position);
    bg.add(glow);gMeshes.push(glow);

    N.push({node,mesh,glow,p:[nx,ny,nz]});
  });
}

function makeEdges(){
  const nm={};N.forEach((n,i)=>nm[n.node.id]=i);
  D.edges.forEach(e=>{
    const si=nm[e.s],ti=nm[e.t];if(si==null||ti==null)return;
    const s=N[si].p,t=N[ti].p;
    const mid=[(s[0]+t[0])/2,(s[1]+t[1])/2+.15,(s[2]+t[2])/2];
    const curve=new THREE.QuadraticBezierCurve3(new THREE.Vector3(...s),new THREE.Vector3(...mid),new THREE.Vector3(...t));
    const pts=curve.getPoints(20);
    const geo=new THREE.BufferGeometry().setFromPoints(pts);

    // Subtle gradient
    const sc=R[D.nodes[si].region]?.c||0x818cf8;
    const tc=R[D.nodes[ti].region]?.c||0x818cf8;
    const cs=new Float32Array(pts.length*3);
    const c1=new THREE.Color(sc),c2=new THREE.Color(tc);
    for(let j=0;j<pts.length;j++){const f=j/(pts.length-1);const cc=c1.clone().lerp(c2,f);cs[j*3]=cc.r;cs[j*3+1]=cc.g;cs[j*3+2]=cc.b}
    geo.setAttribute('color',new THREE.Float32BufferAttribute(cs,3));

    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.035}));
    bg.add(line);E.push({line,si,ti});
  });
}

function makeDust(){
  const n=400,p=new Float32Array(n*3),cl=new Float32Array(n*3);
  const rk=Object.keys(R);
  for(let i=0;i<n;i++){
    const r=3.5+Math.random()*3,t=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.cos(ph);p[i*3+2]=r*Math.sin(ph)*Math.sin(t);
    const rc=R[rk[Math.floor(Math.random()*rk.length)]].c;const cc=new THREE.Color(rc);
    cl[i*3]=cc.r;cl[i*3+1]=cc.g;cl[i*3+2]=cc.b;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cl,3));
  pts=new THREE.Points(g,new THREE.PointsMaterial({size:.03,vertexColors:true,transparent:true,opacity:.2,blending:THREE.AdditiveBlending,sizeAttenuation:true}));
  scene.add(pts);
}

function makeStars(){
  const n=2000,p=new Float32Array(n*3);
  for(let i=0;i<n;i++){p[i*3]=(Math.random()-.5)*80;p[i*3+1]=(Math.random()-.5)*80;p[i*3+2]=(Math.random()-.5)*80}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x1e1b4b,size:.04,transparent:true,opacity:.4})));
}

function makeUI(){
  document.getElementById('hdrStats').innerHTML=
    `<div class="stat"><div class="stat-v">${D.nodes.length}</div><div class="stat-l">Nodes</div></div>`+
    `<div class="stat"><div class="stat-v">${D.edges.length}</div><div class="stat-l">Links</div></div>`+
    `<div class="stat"><div class="stat-v">${Object.keys(R).length}</div><div class="stat-l">Regions</div></div>`;

  let h=`<button class="filter-btn active" data-r="all" onclick="setFilter('all')">All</button>`;
  Object.entries(R).forEach(([id,r])=>{
    const c=D.nodes.filter(n=>n.region===id).length;
    if(c)h+=`<button class="filter-btn" data-r="${id}" onclick="setFilter('${id}')"><span class="filter-dot" style="background:${r.hex};color:${r.hex}"></span>${r.name}</button>`;
  });
  document.getElementById('filters').innerHTML=h;
}

function setFilter(rid){
  filter=rid==='all'?null:rid;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.r===rid));
  nMeshes.forEach((m,i)=>{
    const v=!filter||D.nodes[i].region===filter;
    m.userData.tO=v?.9:.04;m.userData.tE=v?.4:.02;
  });
  gMeshes.forEach((g,i)=>{g.material.opacity=(!filter||D.nodes[i].region===filter)?.04:.002});
  E.forEach(e=>{
    const v=!filter||D.nodes[e.si].region===filter||D.nodes[e.ti].region===filter;
    e.line.material.opacity=v?.035:.003;
  });
}

function onMove(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(nMeshes);
  const tt=document.getElementById('tooltip');
  if(hits.length>0){
    const n=hits[0].object.userData.node;const reg=R[n.region]||{};
    document.getElementById('tooltipName').textContent=n.id.split('/').pop();
    document.getElementById('tooltipRegion').textContent=reg.name||'';
    tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-8)+'px';
    tt.classList.add('visible');document.body.style.cursor='pointer';hovered=n.id;
  }else{tt.classList.remove('visible');document.body.style.cursor='';hovered=null}
}

function onClick(){
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(nMeshes);
  if(hits.length)selectNode(hits[0].object.userData.node);else closePanel();
}

function selectNode(node){
  selected=node;
  const reg=R[node.region]||{},hex=reg.hex||'#818cf8';
  const conn=new Set();
  D.edges.forEach(e=>{if(e.s===node.id)conn.add(e.t);if(e.t===node.id)conn.add(e.s)});
  const tags=[...conn].slice(0,20).map(cid=>{
    const l=cid.split('/').pop();const cr=R[D.nodes.find(n=>n.id===cid)?.region];
    return`<span class="conn-tag" onclick="selectById('${cid}')">${l}</span>`;
  }).join('');
  const rc=node.recall||0;

  document.getElementById('panelContent').innerHTML=`
    <div class="panel-title">${node.id.split('/').pop()}</div>
    <div class="panel-kind">${node.kind}</div>
    <div class="panel-desc">${reg.about||''}</div>
    <div class="panel-grid">
      <div class="panel-metric"><div class="panel-metric-label">Words</div><div class="panel-metric-value">${node.wordCount||0}</div></div>
      <div class="panel-metric"><div class="panel-metric-label">Links</div><div class="panel-metric-value">${conn.size}</div></div>
    </div>
    <div style="margin-top:12px"><div class="panel-metric-label">Recall ${rc.toFixed(2)}</div><div class="recall-bar"><div class="recall-fill" style="width:${rc*100}%"></div></div></div>
    ${node.dreamPromoted?'<div class="dream-badge">🌙 Dream-promoted</div>':''}
    <div class="panel-section"><div class="panel-label">Connected</div><div class="panel-connections">${tags||'<span style="color:#2e2b4a;font-size:11px">None</span>'}</div></div>
    <div class="panel-grid" style="margin-top:16px">
      <div class="panel-metric"><div class="panel-metric-label">Created</div><div class="panel-metric-value" style="font-size:12px">${node.created||'—'}</div></div>
      <div class="panel-metric"><div class="panel-metric-label">Modified</div><div class="panel-metric-value" style="font-size:12px">${node.modified||'—'}</div></div>
    </div>`;
  document.getElementById('panel').classList.add('open');

  nMeshes.forEach((m,i)=>{
    const n=D.nodes[i];const sel=n.id===node.id;const cn=conn.has(n.id);
    m.userData.tE=(sel||cn)?.8:.03;m.userData.tO=(sel||cn)?1:.05;
  });
  E.forEach(e=>{
    const r=D.nodes[e.si]?.id===node.id||D.nodes[e.ti]?.id===node.id;
    e.line.material.opacity=r?.2:.005;
  });
  gMeshes.forEach((g,i)=>{
    const n=D.nodes[i];const sel=n.id===node.id;const cn=conn.has(n.id);
    g.material.opacity=(sel||cn)?.1:.002;
  });
}

function selectById(id){const n=D.nodes.find(n=>n.id===id);if(n)selectNode(n)}
function closePanel(){document.getElementById('panel').classList.remove('open');selected=null;setFilter(filter||'all')}

function loop(){
  requestAnimationFrame(loop);t+=.006;ctrl.update();
  nMeshes.forEach((m,i)=>{
    m.material.emissiveIntensity+=(m.userData.tE-m.material.emissiveIntensity)*.06;
    m.material.opacity+=(m.userData.tO-m.material.opacity)*.06;
    // Subtle pulse
    const p=1+Math.sin(t*2+i*.8)*.03;
    m.scale.setScalar(m.userData.sz*p);
  });
  if(pts){pts.rotation.y=t*.015}
  ren.render(scene,cam);
}

function hashCode(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function pr(s){const x=Math.sin(s*12.9898+78.233)*43758.5453;return x-Math.floor(x)}
load();
</script>
</body>
</html>
