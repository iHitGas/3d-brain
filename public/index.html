<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Brain Atlas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#eee;font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
canvas{display:block}
.hdr{position:fixed;top:0;left:0;right:0;padding:20px 32px;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed);box-shadow:0 0 20px rgba(124,58,237,.5);display:flex;align-items:center;justify-content:center;font-size:14px}
.brand{font-size:13px;font-weight:600;color:#d8b4fe;letter-spacing:.04em}
.brand span{color:#5b21b6;font-weight:400;margin-left:6px}
.stats{display:flex;gap:28px}
.st{text-align:center}
.st-v{font-size:22px;font-weight:600;color:#e9d5ff;text-shadow:0 0 20px rgba(167,139,250,.3)}
.st-l{font-size:8px;color:#3b0764;text-transform:uppercase;letter-spacing:.14em;margin-top:3px}
.nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:3px;padding:5px 8px;border-radius:10px;background:rgba(0,0,0,.6);border:1px solid rgba(139,92,246,.06);backdrop-filter:blur(12px)}
.nb{font-size:10px;padding:5px 10px;border-radius:6px;border:none;background:0;color:#2e1065;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;font-weight:500}
.nb:hover{color:#7c3aed}
.nb.on{color:#c084fc;background:rgba(139,92,246,.08)}
.nd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.panel{position:fixed;right:0;top:0;bottom:0;width:360px;background:rgba(3,0,12,.92);border-left:1px solid rgba(139,92,246,.04);z-index:15;transform:translateX(100%);transition:transform .45s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(30px);padding:40px 24px 24px;overflow-y:auto}
.panel.open{transform:translateX(0)}
.panel::-webkit-scrollbar{width:2px}
.panel::-webkit-scrollbar-thumb{background:rgba(139,92,246,.1);border-radius:2px}
.px{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.03);background:0;color:#3b0764;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.px:hover{color:#a78bfa;border-color:rgba(139,92,246,.15)}
.pt{font-size:20px;font-weight:600;color:#ede9fe}
.pk{display:inline-block;font-size:9px;color:#8b5cf6;text-transform:uppercase;letter-spacing:.1em;margin-top:8px;padding:2px 8px;border-radius:4px;background:rgba(139,92,246,.05)}
.pd{font-size:12px;color:#3b0764;margin-top:8px;line-height:1.4}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.pm{padding:10px;border-radius:8px;background:rgba(255,255,255,.01)}
.pm-l{font-size:8px;color:#2e1065;text-transform:uppercase;letter-spacing:.08em}
.pm-v{font-size:18px;font-weight:700;color:#c4b5fd;margin-top:3px}
.ps{margin-top:14px}
.ps-l{font-size:8px;color:#2e1065;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.pc{display:flex;flex-wrap:wrap;gap:4px}
.ct{font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(139,92,246,.03);color:#7c3aed;cursor:pointer;transition:all .1s;border:1px solid rgba(139,92,246,.03)}
.ct:hover{background:rgba(139,92,246,.08);color:#c084fc}
.rb{height:2px;border-radius:1px;background:rgba(139,92,246,.06);margin-top:5px;overflow:hidden}
.rf{height:100%;border-radius:1px;background:linear-gradient(90deg,#7c3aed,#c084fc)}
.tt{position:fixed;z-index:20;pointer-events:none;padding:5px 10px;border-radius:5px;background:rgba(3,0,12,.85);border:1px solid rgba(139,92,246,.06);opacity:0;transition:opacity .1s;white-space:nowrap}
.tt.on{opacity:1}
.tt-n{font-size:11px;font-weight:600;color:#e9d5ff}
.tt-r{font-size:8px;color:#4c1d95;margin-top:1px}
.ld{position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
.ld.off{opacity:0;visibility:hidden;pointer-events:none}
.ld i{width:36px;height:36px;border-radius:50%;border:2px solid rgba(139,92,246,.06);border-top-color:#7c3aed;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ld" id="ld"><i></i></div>
<div class="tt" id="tt"><div class="tt-n" id="tn"></div><div class="tt-r" id="tr"></div></div>
<div class="hdr"><div class="hdr-l"><div class="logo">🧠</div><div class="brand">Brain Atlas<span>3D</span></div></div><div class="stats" id="stats"></div></div>
<div class="nav" id="nav"></div>
<div class="panel" id="pnl"><button class="px" onclick="closeP()">×</button><div id="pc"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const RG={
  prefrontal:{c:0xa78bfa,p:[0,.3,1.2],h:'#a78bfa',n:'Prefrontal',d:'Identity · Concepts · Decisions'},
  thalamus:{c:0x60a5fa,p:[0,0,0],h:'#60a5fa',n:'Thalamus',d:'Routing · Relay · Templates'},
  hippocampus:{c:0x34d399,p:[-.8,-.2,-.5],h:'#34d399',n:'Hippocampus',d:'Memory · Indexing'},
  motor:{c:0xf9a8d4,p:[0,.8,.3],h:'#f9a8d4',n:'Motor Cortex',d:'Action · Projects'},
  occipital:{c:0xfcd34d,p:[0,-.1,-1.3],h:'#fcd34d',n:'Occipital',d:'Visual · Reference'},
  temporal:{c:0xfdba74,p:[-1.2,0,.3],h:'#fdba74',n:'Temporal',d:'Social · People'},
  cerebellum:{c:0x5eead4,p:[.8,-.5,-.8],h:'#5eead4',n:'Cerebellum',d:'Routines · Daily'},
  limbic:{c:0xd8b4fe,p:[0,.4,-.3],h:'#d8b4fe',n:'Limbic',d:'Dreams · Emotion'}
};

let D,scene,cam,ren,ctrl,ray,mouse,bg,dust;
let NM=[],GM=[],ED=[],ND=[],time=0,hovered=null,selected=null,filter=null;

async function load(){
  try{D=await(await fetch('/api/data')).json()}catch(e){D={nodes:[],edges:[]}}
  init();
}

function init(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x020010,.035);

  cam=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,500);
  cam.position.set(0,1.5,9);

  ren=new THREE.WebGLRenderer({antialias:true});
  ren.setSize(innerWidth,innerHeight);
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.toneMapping=THREE.ACESFilmicToneMapping;
  ren.toneMappingExposure=1.4;
  document.body.appendChild(ren.domElement);

  ctrl=new THREE.OrbitControls(cam,ren.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=.04;
  ctrl.maxDistance=18;ctrl.minDistance=3;
  ctrl.autoRotate=true;ctrl.autoRotateSpeed=.15;

  ray=new THREE.Raycaster();
  mouse=new THREE.Vector2(-9,-9);

  // Lighting — cinematic
  scene.add(new THREE.AmbientLight(0x1a0a2e,.4));
  const dl=new THREE.DirectionalLight(0xc4b5fd,.5);dl.position.set(5,6,4);scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x818cf8,.3);dl2.position.set(-4,-2,-3);scene.add(dl2);
  const rl=new THREE.PointLight(0x7c3aed,.4,15);rl.position.set(0,5,0);scene.add(rl);
  const rl2=new THREE.PointLight(0xc084fc,.3,15);rl2.position.set(0,-5,0);scene.add(rl2);

  bg=new THREE.Group();scene.add(bg);

  // Brain shell
  bg.add(new THREE.Mesh(
    new THREE.IcosahedronGeometry(3.5,4),
    new THREE.MeshBasicMaterial({color:0x1e0a3a,wireframe:true,transparent:true,opacity:.012})
  ));

  buildNodes();buildEdges();buildDust();buildStars();buildUI();

  addEventListener('resize',onResize);
  addEventListener('mousemove',onMove);
  addEventListener('click',onClick);
  setTimeout(()=>document.getElementById('ld').classList.add('off'),400);
  loop();
}

function buildNodes(){
  const rn={};
  D.nodes.forEach((n,i)=>{const r=n.region||'thalamus';if(!rn[r])rn[r]=[];rn[r].push(i)});

  D.nodes.forEach((node,i)=>{
    const reg=RG[node.region]||RG.thalamus;
    const c=reg.c;
    const list=rn[node.region]||[];
    const idx=list.indexOf(i);
    const cnt=list.length;
    const [rx,ry,rz]=reg.p;
    const cx=rx*2,cy=ry*2.5,cz=rz*2;
    const sr=Math.max(.6,Math.sqrt(cnt)*.4);
    let nx,ny,nz;
    if(cnt<=1){nx=cx;ny=cy;nz=cz}
    else if(cnt<=3){const a=(idx/cnt)*Math.PI*2;nx=cx+Math.cos(a)*sr*.5;ny=cy;nz=cz+Math.sin(a)*sr*.5}
    else{const g=Math.PI*(3-Math.sqrt(5)),th=g*idx,ph=Math.acos(1-2*(idx+.5)/cnt);nx=cx+sr*Math.sin(ph)*Math.cos(th);ny=cy+sr*Math.cos(ph);nz=cz+sr*Math.sin(ph)*Math.sin(th)}
    const s=hc(node.id);
    nx+=(pr(s+10)-.5)*.1;ny+=(pr(s+11)-.5)*.1;nz+=(pr(s+12)-.5)*.1;
    const mx=3.1;const l=Math.sqrt(nx*nx+ny*ny+nz*nz);if(l>mx){const sc=mx/l;nx*=sc;ny*=sc;nz*=sc}

    const sz=node.kind==='meta'?.22:node.kind==='dream'?.2:node.kind==='project'?.11:.14;

    // Core sphere — white center + colored emissive for glow
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(sz,20,20),
      new THREE.MeshStandardMaterial({
        color:0xffffff,emissive:c,emissiveIntensity:.8,
        roughness:.15,metalness:.7,
        transparent:true,opacity:.9
      })
    );
    mesh.position.set(nx,ny,nz);
    mesh.userData={node,i,sz,tE:.8,tO:.9};
    bg.add(mesh);NM.push(mesh);

    // Outer glow — additive blended
    const glow=new THREE.Mesh(
      new THREE.SphereGeometry(sz*3,12,12),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.08,blending:THREE.AdditiveBlending,depthWrite:false})
    );
    glow.position.copy(mesh.position);
    bg.add(glow);GM.push(glow);

    // Second larger glow for bloom-like effect
    const glow2=new THREE.Mesh(
      new THREE.SphereGeometry(sz*6,8,8),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.02,blending:THREE.AdditiveBlending,depthWrite:false})
    );
    glow2.position.copy(mesh.position);
    bg.add(glow2);

    ND.push({node,mesh,glow,p:[nx,ny,nz]});
  });
}

function buildEdges(){
  const nm={};ND.forEach((n,i)=>nm[n.node.id]=i);
  D.edges.forEach(e=>{
    const si=nm[e.s],ti=nm[e.t];if(si==null||ti==null)return;
    const s=ND[si].p,t=ND[ti].p;
    const mid=[(s[0]+t[0])/2,(s[1]+t[1])/2+.12,(s[2]+t[2])/2];
    const curve=new THREE.QuadraticBezierCurve3(new THREE.Vector3(...s),new THREE.Vector3(...mid),new THREE.Vector3(...t));
    const pts=curve.getPoints(16);
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const sc=RG[D.nodes[si].region]?.c||0x818cf6;
    const tc=RG[D.nodes[ti].region]?.c||0x818cf6;
    const cs=new Float32Array(pts.length*3);
    const c1=new THREE.Color(sc),c2=new THREE.Color(tc);
    for(let j=0;j<pts.length;j++){const f=j/(pts.length-1);const cc=c1.clone().lerp(c2,f);cs[j*3]=cc.r;cs[j*3+1]=cc.g;cs[j*3+2]=cc.b}
    geo.setAttribute('color',new THREE.Float32BufferAttribute(cs,3));
    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.04}));
    bg.add(line);ED.push({line,si,ti});
  });
}

function buildDust(){
  const n=500,p=new Float32Array(n*3),cl=new Float32Array(n*3);
  const rk=Object.keys(RG);
  for(let i=0;i<n;i++){
    const r=3+Math.random()*4,t=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.cos(ph);p[i*3+2]=r*Math.sin(ph)*Math.sin(t);
    const rc=RG[rk[Math.floor(Math.random()*rk.length)]].c;const cc=new THREE.Color(rc);
    cl[i*3]=cc.r;cl[i*3+1]=cc.g;cl[i*3+2]=cc.b;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(cl,3));
  dust=new THREE.Points(g,new THREE.PointsMaterial({size:.03,vertexColors:true,transparent:true,opacity:.25,blending:THREE.AdditiveBlending,sizeAttenuation:true,depthWrite:false}));
  scene.add(dust);
}

function buildStars(){
  const n=1500,p=new Float32Array(n*3);
  for(let i=0;i<n;i++){p[i*3]=(Math.random()-.5)*60;p[i*3+1]=(Math.random()-.5)*60;p[i*3+2]=(Math.random()-.5)*60}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x1a0a3a,size:.04,transparent:true,opacity:.3,depthWrite:false})));
}

function buildUI(){
  document.getElementById('stats').innerHTML=
    `<div class="st"><div class="st-v">${D.nodes.length}</div><div class="st-l">Nodes</div></div>`+
    `<div class="st"><div class="st-v">${D.edges.length}</div><div class="st-l">Links</div></div>`+
    `<div class="st"><div class="st-v">${Object.keys(RG).length}</div><div class="st-l">Regions</div></div>`;
  let h=`<button class="nb on" data-r="all" onclick="sf('all')">All</button>`;
  Object.entries(RG).forEach(([id,r])=>{
    const c=D.nodes.filter(n=>n.region===id).length;
    if(c)h+=`<button class="nb" data-r="${id}" onclick="sf('${id}')"><span class="nd" style="background:${r.h}"></span>${r.n}</button>`;
  });
  document.getElementById('nav').innerHTML=h;
}

function sf(rid){
  filter=rid==='all'?null:rid;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.r===rid));
  NM.forEach((m,i)=>{
    const v=!filter||D.nodes[i].region===filter;
    m.userData.tO=v?.9:.03;m.userData.tE=v?.8:.02;
  });
  GM.forEach((g,i)=>{g.material.opacity=(!filter||D.nodes[i].region===filter)?.08:.001});
  ED.forEach(e=>{
    const v=!filter||D.nodes[e.si].region===filter||D.nodes[e.ti].region===filter;
    e.line.material.opacity=v?.04:.002;
  });
}

function onMove(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(NM);
  const tt=document.getElementById('tt');
  if(hits.length){
    const n=hits[0].object.userData.node;const r=RG[n.region]||{};
    document.getElementById('tn').textContent=n.id.split('/').pop();
    document.getElementById('tr').textContent=r.n||'';
    tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-8)+'px';
    tt.classList.add('on');document.body.style.cursor='pointer';hovered=n.id;
  }else{tt.classList.remove('on');document.body.style.cursor='';hovered=null}
}

function onClick(){
  ray.setFromCamera(mouse,cam);
  const h=ray.intersectObjects(NM);
  if(h.length)sel(h[0].object.userData.node);else closeP();
}

function sel(node){
  selected=node;
  const reg=RG[node.region]||{},hex=reg.h||'#a78bfa';
  const conn=new Set();
  D.edges.forEach(e=>{if(e.s===node.id)conn.add(e.t);if(e.t===node.id)conn.add(e.s)});
  const tags=[...conn].slice(0,20).map(id=>`<span class="ct" onclick="selById('${id}')">${id.split('/').pop()}</span>`).join('');
  const rc=node.recall||0;
  document.getElementById('pc').innerHTML=`
    <div class="pt">${node.id.split('/').pop()}</div>
    <div class="pk">${node.kind}</div>
    <div class="pd">${reg.d||''}</div>
    <div class="pg">
      <div class="pm"><div class="pm-l">Words</div><div class="pm-v">${node.wordCount||0}</div></div>
      <div class="pm"><div class="pm-l">Links</div><div class="pm-v">${conn.size}</div></div>
    </div>
    <div style="margin-top:10px"><div class="pm-l">Recall ${rc.toFixed(2)}</div><div class="rb"><div class="rf" style="width:${rc*100}%"></div></div></div>
    ${node.dreamPromoted?'<div style="margin-top:10px;font-size:10px;color:#c084fc">🌙 Dream-promoted</div>':''}
    <div class="ps"><div class="ps-l">Connected</div><div class="pc">${tags||'<span style="color:#2e1065;font-size:10px">None</span>'}</div></div>
    <div class="pg" style="margin-top:14px">
      <div class="pm"><div class="pm-l">Created</div><div class="pm-v" style="font-size:11px">${node.created||'—'}</div></div>
      <div class="pm"><div class="pm-l">Modified</div><div class="pm-v" style="font-size:11px">${node.modified||'—'}</div></div>
    </div>`;
  document.getElementById('pnl').classList.add('open');
  NM.forEach((m,i)=>{
    const n=D.nodes[i];const s=n.id===node.id;const c=conn.has(n.id);
    m.userData.tE=(s||c)?1.5:.02;m.userData.tO=(s||c)?1:.03;
  });
  ED.forEach(e=>{
    const r=D.nodes[e.si]?.id===node.id||D.nodes[e.ti]?.id===node.id;
    e.line.material.opacity=r?.2:.001;
  });
  GM.forEach((g,i)=>{
    const n=D.nodes[i];const s=n.id===node.id;const c=conn.has(n.id);
    g.material.opacity=(s||c)?.15:.001;
  });
}

function selById(id){const n=D.nodes.find(x=>x.id===id);if(n)sel(n)}
function closeP(){document.getElementById('pnl').classList.remove('open');selected=null;sf(filter||'all')}
function onResize(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)}

function loop(){
  requestAnimationFrame(loop);time+=.005;ctrl.update();
  NM.forEach((m,i)=>{
    m.material.emissiveIntensity+=(m.userData.tE-m.material.emissiveIntensity)*.05;
    m.material.opacity+=(m.userData.tO-m.material.opacity)*.05;
    const p=1+Math.sin(time*2.5+i*.8)*.025;
    m.scale.setScalar(m.userData.sz*p);
  });
  if(dust)dust.rotation.y=time*.01;
  ren.render(scene,cam);
}

function hc(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function pr(s){const x=Math.sin(s*12.9898+78.233)*43758.5453;return x-Math.floor(x)}
load();
</script>
</body>
</html>
